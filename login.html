<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Stackly Telecom Portal</title>
  <meta name="description" content="Sign in to your Stackly Customer or Admin portal to check data usage, manage recharges, and view reports.">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-light);">

  <!-- Stackly Global Preloader -->
  <div id="stackly-preloader" class="stackly-preloader">
    <div class="preloader-content">
      <div class="preloader-logo-wrapper">
        <img src="assets/Logo11.webp" alt="Stackly Telecom" class="preloader-logo">
        <div class="preloader-spinner"></div>
      </div>
      <div class="preloader-brand-title">STACKLY TELECOM</div>
      <div class="preloader-bar-container">
        <div class="preloader-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-back-btn" id="loginBackHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
      
      <div class="auth-header">
        <a href="index.html" style="display: inline-block;">
          <img src="assets/Logo11.webp" alt="Stackly Logo" class="auth-logo">
        </a>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to manage your connections and data services</p>
      </div>

      <!-- Form wide notification error -->
      <div id="formErrorMsg" style="background-color: rgba(230,0,18,0.1); color: var(--primary-red); border: 1px solid var(--primary-red); padding: 0.75rem 1rem; border-radius: var(--border-radius-sm); font-size: 0.85rem; font-weight: 600; margin-bottom: 1.5rem; display: none;">
        <!-- Filled by JS -->
      </div>

      <form id="loginForm">
        <div class="form-group" id="loginEmailGroup">
          <label class="form-label" for="loginEmail">Gmail Address</label>
          <input type="text" id="loginEmail" placeholder="username@gmail.com" class="form-input">
          <span class="error-msg" id="loginEmailError">Enter a valid Gmail address.</span>
        </div>

        <div class="form-group" id="loginPasswordGroup" style="margin-bottom: 1.5rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
            <label class="form-label" for="loginPassword" style="margin-bottom: 0;">Password</label>
            <a href="404.html" class="forgot-password-link" style="font-size: 0.85rem; color: var(--primary-red); font-weight: 600;">Forgot Password?</a>
          </div>
          <input type="password" id="loginPassword" placeholder="••••••••" class="form-input">
          <span class="error-msg" id="loginPasswordError">Password must contain at least 2 characters.</span>
        </div>

        <div class="form-group" id="loginRoleGroup" style="margin-bottom: 1.5rem;">
          <label class="form-label" for="loginRole">Select Dashboard</label>
          <select id="loginRole" class="form-input">
            <option value="customer">User Dashboard</option>
            <option value="admin">Admin Dashboard</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>



  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Main JS Files -->
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("loginEmail");
      const passInput = document.getElementById("loginPassword");

      const emailGroup = document.getElementById("loginEmailGroup");
      const passGroup = document.getElementById("loginPasswordGroup");

      if (emailInput) {
        emailInput.addEventListener("input", () => {
          if (emailInput.value.trim() && emailInput.value.includes("@")) {
            if (emailGroup) emailGroup.classList.remove("has-error");
          }
        });
      }

      if (passInput) {
        passInput.addEventListener("input", () => {
          if (passInput.value.length >= 2) {
            if (passGroup) passGroup.classList.remove("has-error");
          }
        });
      }
      
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = emailInput ? emailInput.value : "";
        const pass = passInput ? passInput.value : "";
        const role = document.getElementById("loginRole").value;

        const formError = document.getElementById("formErrorMsg");

        // Reset error styling
        if (emailGroup) emailGroup.classList.remove("has-error");
        if (passGroup) passGroup.classList.remove("has-error");
        if (formError) formError.style.display = "none";

        handleLogin(email, pass, role, (field, message) => {
          if (field === "email") {
            if (emailGroup) emailGroup.classList.add("has-error");
            const errEl = document.getElementById("loginEmailError");
            if (errEl) errEl.innerText = message;
            if (emailInput) emailInput.focus();
          } else if (field === "password") {
            if (passGroup) passGroup.classList.add("has-error");
            const errEl = document.getElementById("loginPasswordError");
            if (errEl) errEl.innerText = message;
            if (passInput) passInput.focus();
          } else if (field === "form") {
            if (formError) {
              formError.innerText = message;
              formError.style.display = "block";
              gsap.fromTo(formError, 
                { x: -10 },
                { x: 10, duration: 0.1, repeat: 4, yoyo: true, ease: "sine.inOut", onComplete: () => {
                  formError.style.transform = "translateX(0px)";
                }}
              );
            }
          }
        });
      });

      // Animate entry card
      gsap.from(".auth-card", {
        opacity: 0,
        y: 40,
        duration: 0.6,
        ease: "back.out(1.2)"
      });
    });
  </script>
</body>
</html>
